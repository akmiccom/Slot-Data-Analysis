name: slot_data_analysis

# 自動実行のタイミングを指定
on:
  schedule:
    # JST 00:05, 03:05, 04:05, 05:05, 06:05, 07:05, 08:05, 09:05
    - cron: "5 15,18-23 * * *"
    - cron: "5 0 * * *"

    # JST 10:05, 12:05, 14:05, 16:05, 18:05, 21:05
    - cron: "5 1,3,5,7,9,12 * * *"

  # 手動実行
  workflow_dispatch:
    inputs:
      target_dates:
        description: "再取得する日付。例: 2026-07-06 または 2026-07-06,2026-07-07"
        required: false
        default: ""
      force_rescrape:
        description: "取得済みでも再取得する"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      disable_pre_skip:
        description: "事前スキップを無効にする"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  run-scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Set JST runtime variables
        run: |
          echo "JST_DATE=$(TZ=Asia/Tokyo date +%F)" >> $GITHUB_ENV
          echo "JST_HOUR=$(TZ=Asia/Tokyo date +%H)" >> $GITHUB_ENV

      - name: Run Playwright script
        # run: python scraper/scraping_hall_page.py
        # run: python scraper/scraping_date_page.py
        # run: python scraper/scraping_model_page.py
        # run: python scraper/scraping_results.py
        # run: python scraper/scraper.py
        run: python -m scraper.scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JST_DATE: ${{ env.JST_DATE }}
          JST_HOUR: ${{ env.JST_HOUR }}
          TARGET_DATES: ${{ github.event.inputs.target_dates }}
          FORCE_RESCRAPE: ${{ github.event.inputs.force_rescrape }}
          DISABLE_PRE_SKIP: ${{ github.event.inputs.disable_pre_skip }}

      - name: Save scraped logs and csv
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: scraped-logs-and-csv
          path: |
            data/logs
            data/csv
            .scraper_state
          if-no-files-found: warn



          
